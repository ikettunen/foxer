name: Integration Tests & Screenshots

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        cache: true

    - name: Get dependencies
      run: flutter pub get

    - name: Run integration tests with screenshots
      run: |
        flutter test integration_test/app_test.dart \
          -v
      timeout-minutes: 30

    - name: Create screenshots directory
      if: always()
      run: |
        mkdir -p build/screenshots
        echo "Screenshots captured during test run" > build/screenshots/README.txt
        echo "See test output above for screenshot timing" >> build/screenshots/README.txt

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: |
          build/
          .dart_tool/test_results.json
        retention-days: 30

    - name: Publish test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Integration Test Report
        path: '.dart_tool/test_results.json'
        reporter: 'dart-json'
        fail-on-error: false

    - name: Comment PR with test results
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const testSummary = `## ✅ Integration Tests Completed
          
          - **Platform**: Chrome
          - **Tests**: Login Flow, Navigation, Login Persistence
          - **Status**: Check artifacts for results
          
          [📊 Download Test Results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: testSummary
          })

