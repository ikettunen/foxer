name: CI/CD - Code Analysis & Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        cache: true

    - name: Get dependencies
      run: flutter pub get

    - name: Run code analysis
      run: flutter analyze

    - name: Run widget tests
      run: flutter test test/ 
      timeout-minutes: 15

    - name: Run integration tests (local only)
      if: github.event_name == 'workflow_dispatch'
      run: |
        echo "Integration tests must be run locally with a connected device."
        echo "Supported platforms:"
        echo "  - Android Emulator: flutter test integration_test/app_test.dart -d emulator-5554"
        echo "  - iOS Simulator: flutter test integration_test/app_test.dart -d ios"
        echo "  - Windows Desktop: flutter test integration_test/app_test.dart -d windows"
        echo "  - Chrome: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/app_test.dart -d chrome"
        echo "Note: Web devices are not supported for flutter test integration tests"

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: |
          build/
        retention-days: 7

    - name: Publish test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Widget Test Report
        path: 'build/'
        reporter: 'dart-json'
        fail-on-error: false

    - name: Comment PR with test results
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const testSummary = `## ✅ CI Checks Completed
          
          - **Code Analysis**: flutter analyze
          - **Unit Tests**: flutter test test/
          - **Coverage**: Enabled
          
          **Integration Tests**: Run locally on device
          - Android Emulator: \`flutter test integration_test/app_test.dart -d emulator-5554\`
          - iOS Simulator: \`flutter test integration_test/app_test.dart -d ios\`
          - Windows Desktop: \`flutter test integration_test/app_test.dart -d windows\`
          - Chrome: \`flutter drive --driver=test_driver/integration_test.dart --target=integration_test/app_test.dart -d chrome\`
          
          [📊 View Test Results & Coverage](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: testSummary
          })

