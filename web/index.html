<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Foxer Paragliding Training App">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Foxer Paragliding">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <title>Foxer Paragliding</title>
  <link rel="manifest" href="manifest.json">
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyANeXz8Z_1ukadMZfTYfhfKVPzuAWF6TzA"></script>
</head>
<body>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      if (window._flutter) {
        _flutter.loader.load({
          onEntrypointLoaded: async function(engineInitializer) {
            let appRunner = await engineInitializer.initializeEngine();
            await appRunner.runApp();
          }
        });
      } else {
        document.addEventListener('flutter-initialized', function() {
          _flutter.loader.load({
            onEntrypointLoaded: async function(engineInitializer) {
              let appRunner = await engineInitializer.initializeEngine();
              await appRunner.runApp();
            }
          });
        });
      }
    });
  </script>
</body>
</html>
